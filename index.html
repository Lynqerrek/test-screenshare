<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>VR Stream — PC Sender</title>
  <style>
    :root{
      --bg:#070b12; --panel:#0d1420; --border:#1a2a3a; --accent:#00e5ff; --accent2:#ff3d71;
      --text:#c8d8e8; --dim:#4a6a8a;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      min-height:100vh;background:var(--bg);color:var(--text);
      font-family:system-ui,sans-serif;padding:16px;display:flex;justify-content:center
    }
    .wrap{width:100%;max-width:820px;display:grid;gap:12px}
    .head,.card{
      background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:14px
    }
    .head h1{font-size:20px;color:var(--accent);letter-spacing:.12em}
    .sub{font-size:12px;color:var(--dim);margin-top:4px}
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .btn{
      border:1px solid var(--accent);background:transparent;color:var(--accent);
      padding:10px 14px;border-radius:10px;cursor:pointer;font:inherit
    }
    .btn.primary{background:rgba(0,229,255,.12)}
    .btn.danger{border-color:var(--accent2);color:var(--accent2)}
    .btn:disabled{opacity:.35;cursor:not-allowed}
    .status{font-family:ui-monospace,monospace;font-size:12px;color:var(--dim)}
    video{width:100%;max-height:320px;background:#000;border:1px solid var(--border);border-radius:12px;margin-top:10px}
    .box{
      position:relative;background:rgba(0,0,0,.35);border:1px solid var(--border);
      border-radius:12px;padding:12px;word-break:break-all;font-family:ui-monospace,monospace;
      font-size:12px;color:var(--accent);min-height:48px
    }
    .copy{
      position:absolute;top:10px;right:10px;border:1px solid var(--accent);background:rgba(0,229,255,.1);
      color:var(--accent);border-radius:8px;padding:6px 10px;cursor:pointer;font-size:11px
    }
    textarea{
      width:100%;min-height:88px;background:#000;border:1px solid var(--border);
      color:var(--accent);border-radius:12px;padding:10px;font:inherit;resize:vertical;outline:none
    }
    .dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--dim);margin-right:6px;vertical-align:middle}
    .dot.active{background:#00ff88;box-shadow:0 0 10px #00ff88}
    .dot.error{background:var(--accent2)}
    .mini{font-size:12px;color:var(--dim);line-height:1.5}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="head">
      <h1>VR STREAM — PC</h1>
      <div class="sub">Share your screen, then send the short code to the phone.</div>
    </div>

    <div class="card">
      <div class="row" style="justify-content:space-between">
        <strong>Screen Share</strong>
        <span class="status" id="status"><span class="dot"></span>Idle</span>
      </div>
      <div class="row" style="margin-top:10px">
        <button class="btn primary" id="startBtn">Start Screen Share</button>
        <button class="btn danger" id="stopBtn" disabled>Stop</button>
      </div>
      <video id="preview" autoplay muted playsinline></video>
    </div>

    <div class="card">
      <strong>Connection Code</strong>
      <div class="mini" style="margin:6px 0 10px">Copy this shorter code into the phone.</div>
      <div class="box" id="offerBox">
        Start screen share first...
        <button class="copy" id="copyOffer" style="display:none">COPY</button>
      </div>
    </div>

    <div class="card">
      <strong>Paste Phone Answer</strong>
      <div class="mini" style="margin:6px 0 10px">After the phone creates its answer code, paste it here.</div>
      <textarea id="answerInput" placeholder="Paste answer code..."></textarea>
      <div class="row" style="margin-top:10px">
        <button class="btn primary" id="connectBtn" disabled>Connect</button>
      </div>
      <div class="status" id="peerState" style="margin-top:10px"><span class="dot"></span>No phone connected</div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.5.0/lz-string.min.js"></script>
  <script>
    const pack = o => LZString.compressToEncodedURIComponent(JSON.stringify(o));
    const unpack = s => JSON.parse(LZString.decompressFromEncodedURIComponent(s));

    let pc = null, localStream = null, offerText = '';

    const $ = id => document.getElementById(id);
    const iceServers = [
      { urls: 'stun:stun.l.google.com:19302' },
      { urls: 'stun:stun1.l.google.com:19302' }
    ];

    function setStatus(text, kind='') {
      $('status').innerHTML = `<span class="dot ${kind}"></span>${text}`;
    }

    function setPeer(text, kind='') {
      $('peerState').innerHTML = `<span class="dot ${kind}"></span>${text}`;
    }

    async function startCapture() {
      try {
        localStream = await navigator.mediaDevices.getDisplayMedia({
          video: { frameRate: { ideal: 30, max: 60 }, width: { ideal: 1920 }, height: { ideal: 1080 } },
          audio: false
        });

        $('preview').srcObject = localStream;
        $('startBtn').disabled = true;
        $('stopBtn').disabled = false;
        setStatus('Screen share active', 'active');

        pc = new RTCPeerConnection({ iceServers });
        localStream.getTracks().forEach(t => pc.addTrack(t, localStream));

        pc.onicecandidate = e => {
          if (!e.candidate) {
            offerText = pack(pc.localDescription);
            $('offerBox').innerHTML =
              `<span>${offerText}</span><button class="copy" id="copyOffer">COPY</button>`;
            $('copyOffer').onclick = () => navigator.clipboard.writeText(offerText).then(() => {
              $('copyOffer').textContent = 'COPIED';
              setTimeout(() => $('copyOffer').textContent = 'COPY', 1500);
            });
            $('connectBtn').disabled = false;
          }
        };

        pc.onconnectionstatechange = () => {
          if (!pc) return;
          if (pc.connectionState === 'connected') setPeer('Phone connected', 'active');
          else if (pc.connectionState === 'failed' || pc.connectionState === 'disconnected') setPeer('Connection lost', 'error');
          else setPeer(pc.connectionState);
        };

        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
      } catch (e) {
        setStatus('Error: ' + e.message, 'error');
      }
    }

    async function connectAnswer() {
      const raw = $('answerInput').value.trim();
      if (!raw || !pc) return;
      try {
        const answer = unpack(raw);
        await pc.setRemoteDescription(new RTCSessionDescription(answer));
        setStatus('Answer accepted', 'active');
      } catch (e) {
        alert('Invalid answer code: ' + e.message);
      }
    }

    function stopCapture() {
      if (localStream) {
        localStream.getTracks().forEach(t => t.stop());
        localStream = null;
      }
      if (pc) {
        pc.close();
        pc = null;
      }

      $('preview').srcObject = null;
      $('startBtn').disabled = false;
      $('stopBtn').disabled = true;
      $('connectBtn').disabled = true;
      $('answerInput').value = '';
      $('offerBox').innerHTML = 'Start screen share first... <button class="copy" id="copyOffer" style="display:none">COPY</button>';
      $('copyOffer').style.display = 'none';
      offerText = '';
      setStatus('Stopped');
      setPeer('No phone connected');
    }

    $('startBtn').onclick = startCapture;
    $('stopBtn').onclick = stopCapture;
    $('connectBtn').onclick = connectAnswer;
  </script>
</body>
</html>
