<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ultra-Low Latency VR Streamer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { 
            background-color: #020617; 
            color: white; 
            overflow: hidden; 
            touch-action: none;
            font-family: system-ui, -apple-system, sans-serif;
        }
        #vr-container { 
            display: none; 
            width: 100vw; 
            height: 100vh; 
            background: #000; 
            flex-direction: row; 
            position: absolute; 
            top: 0; left: 0; 
            z-index: 50; 
        }
        .eye { 
            width: 50%; height: 100%; 
            display: flex; align-items: center; justify-content: center; 
            overflow: hidden; position: relative; background: #000; 
        }
        .eye video { 
            width: 100%; height: 100%; 
            object-fit: contain; 
            image-rendering: pixelated; 
        }
        .divider { 
            position: absolute; left: 50%; top: 0; bottom: 0; width: 2px; 
            background: rgba(255,255,255,0.1); z-index: 20; transform: translateX(-50%); 
        }
        .latency-badge {
            background: rgba(16, 185, 129, 0.2);
            border: 1px solid rgba(16, 185, 129, 0.5);
            color: #10b981;
            padding: 2px 8px;
            border-radius: 99px;
            font-size: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen">

    <!-- Main Menu -->
    <div id="screen-menu" class="flex flex-col items-center justify-center w-full max-w-md p-8 text-center space-y-8">
        <div>
            <h1 class="text-6xl font-black tracking-tighter text-transparent bg-clip-text bg-gradient-to-br from-white to-slate-500 mb-2">ULTRA VR</h1>
            <div class="flex items-center justify-center gap-2">
                <span class="latency-badge">STABLE CONNECT</span>
                <span class="latency-badge text-blue-400 border-blue-400 bg-blue-400/20">v1.2</span>
            </div>
        </div>
        <div class="w-full space-y-4">
            <button onclick="showScreen('screen-host')" class="w-full py-5 px-6 bg-white text-black hover:bg-slate-200 rounded-2xl font-bold text-xl transition-all">
                Share My Screen
            </button>
            <button onclick="showScreen('screen-client')" class="w-full py-5 px-6 bg-slate-800 hover:bg-slate-700 rounded-2xl font-bold text-xl transition-all border border-slate-700">
                Connect Mobile VR
            </button>
        </div>
    </div>

    <!-- Host View -->
    <div id="screen-host" class="hidden flex-col items-center justify-center w-full max-w-lg p-6 text-center space-y-6">
        <h2 class="text-3xl font-bold text-white">Broadcasting</h2>
        <div id="host-step-1" class="w-full">
            <button onclick="startScreenShare()" class="w-full py-6 px-8 bg-blue-600 hover:bg-blue-500 rounded-3xl font-black text-2xl shadow-lg shadow-blue-500/20">
                START STREAM
            </button>
        </div>
        <div id="host-step-2" class="hidden w-full flex-col items-center space-y-6">
            <div id="qrcode-container" class="bg-white p-4 rounded-3xl">
                <div id="qrcode"></div>
            </div>
            <div>
                <p class="text-slate-500 text-xs font-bold uppercase tracking-widest">Access Code</p>
                <h1 id="host-id-display" class="text-5xl font-mono font-black text-blue-500 tracking-tighter italic">...</h1>
            </div>
            <video id="host-preview" autoplay muted class="w-full rounded-2xl border border-slate-800 aspect-video object-cover bg-black"></video>
            <div id="host-status-box" class="flex items-center gap-2 text-blue-400 font-medium italic">
                <div class="w-2 h-2 bg-blue-400 rounded-full animate-ping"></div>
                <span id="host-status">Waiting for connection...</span>
            </div>
        </div>
        <button onclick="location.reload()" class="text-slate-600 hover:text-white text-sm font-bold">CANCEL</button>
    </div>

    <!-- Client View -->
    <div id="screen-client" class="hidden flex-col items-center justify-center w-full max-w-md p-6 text-center space-y-6">
        <h2 class="text-3xl font-bold">Connect</h2>
        <input type="text" id="target-id-input" maxlength="5" placeholder="CODE" class="w-full text-center text-5xl font-black tracking-tighter py-6 bg-slate-900 border-2 border-slate-800 rounded-3xl text-white uppercase focus:border-blue-500 focus:outline-none">
        <button id="join-btn" onclick="connectToHost()" class="w-full py-5 bg-blue-600 hover:bg-blue-500 rounded-3xl font-bold text-xl shadow-lg shadow-blue-500/20">Join Stream</button>
        <div id="client-debug" class="text-xs text-slate-500 font-mono bg-slate-900/50 p-3 rounded-xl w-full text-left hidden"></div>
        <p id="client-status" class="text-sm text-slate-400 min-h-[1.25rem]"></p>
        <button onclick="location.reload()" class="text-slate-600 hover:text-white text-sm font-bold uppercase">Back to Menu</button>
    </div>

    <!-- VR Split Screen -->
    <div id="vr-container">
        <div class="eye"><video id="video-left" autoplay playsinline muted></video></div>
        <div class="divider"></div>
        <div class="eye"><video id="video-right" autoplay playsinline muted></video></div>
        <div id="vr-ui" class="absolute inset-x-0 bottom-10 flex justify-center gap-4 z-50 opacity-0 transition-opacity duration-300 pointer-events-none">
            <button onclick="exitVRMode()" class="bg-red-600 px-6 py-3 rounded-full font-bold pointer-events-auto shadow-lg">Exit VR</button>
            <button onclick="adjustIPD(-2)" class="bg-slate-800 px-6 py-3 rounded-full font-bold pointer-events-auto">IPD -</button>
            <button onclick="adjustIPD(2)" class="bg-slate-800 px-6 py-3 rounded-full font-bold pointer-events-auto">IPD +</button>
        </div>
    </div>

    <script>
        let peer = null;
        let localStream = null;
        let currentIpd = 0;
        let uiTimeout;

        const peerConfig = {
            debug: 2,
            config: {
                iceServers: [
                    { urls: "stun:stun.l.google.com:19302" },
                    { urls: "stun:stun1.l.google.com:19302" }
                ],
                sdpSemantics: "unified-plan"
            }
        };

        function logDebug(msg) {
            const dbg = document.getElementById('client-debug');
            dbg.classList.remove('hidden');
            dbg.innerHTML += `> ${msg}<br>`;
            console.log(msg);
        }

        function showScreen(id) {
            ['screen-menu', 'screen-host', 'screen-client'].forEach(s => document.getElementById(s).classList.add('hidden'));
            const el = document.getElementById(id);
            el.classList.remove('hidden');
            el.classList.add('flex');
        }

        async function startScreenShare() {
            try {
                // Request stream FIRST to ensure user permission
                localStream = await navigator.mediaDevices.getDisplayMedia({ 
                    video: { frameRate: 60, width: { ideal: 1280 }, height: { ideal: 720 } },
                    audio: false 
                });

                const hostId = Math.random().toString(36).substring(2, 7).toUpperCase();
                peer = new Peer(hostId, peerConfig);

                peer.on('open', (id) => {
                    document.getElementById('host-id-display').innerText = id;
                    document.getElementById('qrcode').innerHTML = "";
                    new QRCode(document.getElementById("qrcode"), { 
                        text: window.location.href.split('?')[0] + '?id=' + id, 
                        width: 140, height: 140 
                    });

                    document.getElementById('host-preview').srcObject = localStream;
                    document.getElementById('host-step-1').classList.add('hidden');
                    document.getElementById('host-step-2').classList.remove('hidden');
                    document.getElementById('host-step-2').classList.add('flex');
                });

                // Handle incoming data connection (ping)
                peer.on('connection', conn => {
                    conn.on('open', () => {
                        conn.send('ACK'); // Acknowledge presence
                        document.getElementById('host-status').innerText = "PEER CONNECTING...";
                    });
                });

                // Handle incoming media call
                peer.on('call', call => {
                    call.answer(localStream);
                    call.on('stream', () => {
                        document.getElementById('host-status').innerText = "STREAMING ACTIVE";
                        document.getElementById('host-status-box').classList.add('text-green-400');
                    });
                });

                peer.on('error', err => {
                    alert("Host Network Error: " + err.type);
                });

                // Handle stream ending (user clicks 'stop sharing' in browser)
                localStream.getVideoTracks()[0].onended = () => location.reload();

            } catch (e) { 
                alert("Permission Denied: Could not start screen share.");
            }
        }

        function connectToHost() {
            const tid = document.getElementById('target-id-input').value.toUpperCase().trim();
            const status = document.getElementById('client-status');
            const btn = document.getElementById('join-btn');
            
            if(!tid) return;

            btn.disabled = true;
            btn.innerText = "CONNECTING...";
            status.innerText = "Initializing network...";
            logDebug("Starting peer for " + tid);

            if (peer) peer.destroy();
            peer = new Peer(null, peerConfig);
            
            peer.on('open', () => {
                logDebug("Peer ready. Sending handshake...");
                
                // Step 1: Handshake via Data Connection
                const conn = peer.connect(tid);
                
                const handshakeTimeout = setTimeout(() => {
                    status.innerText = "Host unreachable. Check code/Wi-Fi.";
                    logDebug("Handshake timeout.");
                    btn.disabled = false;
                    btn.innerText = "Join Stream";
                }, 8000);

                conn.on('open', () => {
                    clearTimeout(handshakeTimeout);
                    logDebug("Handshake success. Requesting video...");
                    status.innerText = "Handshake OK. Linking Video...";

                    // Step 2: Request Video
                    const call = peer.call(tid, null);
                    
                    call.on('stream', stream => {
                        logDebug("Video stream received!");
                        enterVRMode(stream);
                    });

                    call.on('error', e => {
                        logDebug("Call error: " + e);
                        status.innerText = "Video Link Failed.";
                        btn.disabled = false;
                    });
                });
            });

            peer.on('error', err => {
                logDebug("Critical Error: " + err.type);
                status.innerText = "Network Error: " + err.type;
                btn.disabled = false;
                btn.innerText = "Join Stream";
            });
        }

        function enterVRMode(stream) {
            document.getElementById('screen-client').classList.add('hidden');
            document.getElementById('vr-container').style.display = 'flex';
            
            const l = document.getElementById('video-left');
            const r = document.getElementById('video-right');
            
            l.srcObject = stream;
            r.srcObject = stream;

            const playVideo = () => {
                l.play();
                r.play();
            };

            // Attempt play (handling mobile interaction requirements)
            playVideo();
            document.addEventListener('touchstart', playVideo, { once: true });
            
            if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
            document.addEventListener('touchstart', showVRUI);
        }

        function adjustIPD(val) {
            currentIpd += val;
            document.getElementById('video-left').style.transform = `translateX(${currentIpd}px)`;
            document.getElementById('video-right').style.transform = `translateX(${-currentIpd}px)`;
            showVRUI();
        }

        function showVRUI() {
            const ui = document.getElementById('vr-ui');
            ui.style.opacity = '1'; ui.style.pointerEvents = 'auto';
            clearTimeout(uiTimeout);
            uiTimeout = setTimeout(() => { 
                ui.style.opacity = '0'; ui.style.pointerEvents = 'none'; 
            }, 3000);
        }

        function exitVRMode() { location.reload(); }

        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');
            if (id) {
                showScreen('screen-client');
                document.getElementById('target-id-input').value = id.toUpperCase();
                setTimeout(connectToHost, 1000);
            }
        };
    </script>
</body>
</html>
